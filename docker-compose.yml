services:
  camera-ai:
    image: ghcr.io/fvillarino/video-ai-detector:${APP_VERSION:-latest}
    restart: unless-stopped
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./snapshots:/app/snapshots
      - ./models:/app/models
    network_mode: host

  snapshots-server:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./snapshots:/usr/share/nginx/html/snapshots:ro
